<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Muay Thai Timer</title>
    <style>
      /* Fill the viewport so React Native flex layout works correctly */
      html,
      body {
        height: 100%;
        margin: 0;
        background-color: #0a0a0a;
        /* Disable native body scroll — all scrolling goes through RN ScrollView */
        overflow: hidden;
      }
      #root {
        height: 100%;
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
